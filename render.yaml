services:
  - type: web
    name: lead-engine-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: POSTGRES_URI
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: "admin@vetrex.com"
      - key: ADMIN_PASSWORD
        value: "admin123"

