services:
  - type: web
    name: lead-engine-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: POSTGRES_URI
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: "admin@vetrex.com"
      - key: ADMIN_PASSWORD
        value: "admin123"

  - type: web
    name: lead-engine-frontend
    env: static
    buildCommand: "cd frontend-web && npm install && npm run build"
    staticPublishPath: "./frontend-web/dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: lead-engine-backend
          envVarKey: RENDER_EXTERNAL_URL
